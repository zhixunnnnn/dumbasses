<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESG Intelligence</title>
    <script>
      // Apply the theme before first paint to avoid a flash. Light is default;
      // only an explicit saved "dark" preference switches to dark.
      (function () {
        try {
          var saved = localStorage.getItem("polyfintech-theme");
          document.documentElement.dataset.theme = saved === "dark" ? "dark" : "light";
        } catch (e) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body class="bg-canvas">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
